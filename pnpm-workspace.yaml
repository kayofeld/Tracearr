packages:
  - "apps/*"
  - "packages/*"
overrides:
  lightningcss: 1.30.2
  react: 19.2.7
  react-dom: 19.2.7
  hono: '>=4.12.12'
  '@hono/node-server': '>=1.19.13'
  fast-jwt: '>=6.2.2'
  express-rate-limit: '>=8.2.2'
  flatted: '>=3.4.0'
  node-forge: '>=1.4.0'
  yaml: '>=2.8.3'
  picomatch@>=4: '>=4.0.4'
  picomatch@<4: '>=2.3.2'
  brace-expansion@>=4: '>=5.0.5'
  brace-expansion@<2: '>=1.1.13'
  brace-expansion@>=2 <4: '>=2.0.3'
  path-to-regexp@>=8: '>=8.4.0'
  rollup@>=4: '>=4.59.0'
  socket.io-parser: '>=4.2.6'
  lodash: '>=4.17.23'
  bn.js@<5: '>=4.12.3'
  minimatch@<4: '>=3.1.3'
publicHoistPattern:
  - '@babel/types'
allowBuilds:
  '@shopify/react-native-skia': true
  esbuild: true
  react-native-nitro-modules: true
  '@scarf/scarf': false
  '@tree-sitter-grammars/tree-sitter-yaml': false
  bcrypt: false
  core-js-pure: false
  msgpackr-extract: false
  msw: false
  sharp: false
  tree-sitter: false
  tree-sitter-json: false
minimumReleaseAgeExclude:
  - '@fastify/swagger@9.8.1'
  - '@turbo/darwin-64@2.10.5'
  - '@turbo/darwin-arm64@2.10.5'
  - '@turbo/linux-64@2.10.5'
  - '@turbo/linux-arm64@2.10.5'
  - '@turbo/windows-64@2.10.5'
  - '@turbo/windows-arm64@2.10.5'
  - turbo@2.10.5

# CI/TESTING ONLY - Isolated test databases on different ports
# NOT for production deployment - see docker/examples/ for deployment configs

version: "3.8"

services:
  timescale-test:
    image: timescale/timescaledb:2.25.0-pg16@sha256:9e9f50161784dc57d3f547b89ded4af73553f9acb4677345ed05f45af7c7f664
    shm_size: 512mb  # Required for PostgreSQL shared memory (increase for large imports)
    # Increase lock table size for large imports (Tautulli imports with many TimescaleDB chunks)
    command: postgres -c max_locks_per_transaction=4096 -c timescaledb.telemetry_level=off
    ports:
      - "5433:5432"  # Different port to avoid conflicts with dev
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=tracearr_test
    volumes:
      - timescale_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d tracearr_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:8-alpine@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    ports:
      - "6380:6379"  # Different port to avoid conflicts with dev
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  timescale_test_data:
  redis_test_data:
